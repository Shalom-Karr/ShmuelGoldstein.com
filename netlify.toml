[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  framework = "#static"
  port = 8888
  autoLaunch = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://i9.ytimg.com https://vumbnail.com; media-src 'self' https://*.supabase.co; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://cloudflareinsights.com; form-action 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    # img-src includes https: so external <img> tags in inbox emails render.
    # The iframe stays sandboxed (no allow-scripts / allow-same-origin) so a
    # tracking pixel can't read cookies or run JS — just hits its origin once.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' https://*.supabase.co https:; frame-src 'self'; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; form-action 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'"

# Purchase access page — personal Zoom credentials; never index or cache
[[headers]]
  for = "/access*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/favicon.ico"
  to = "/assets/favicons/favicon.ico"
  status = 301

[[redirects]]
  from = "/site.webmanifest"
  to = "/assets/favicons/site.webmanifest"
  status = 301

[[redirects]]
  from = "/coaching"
  to = "/coaching.html"
  status = 200

[[redirects]]
  from = "/shiurim"
  to = "/shiurim.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/approach"
  to = "/approach.html"
  status = 200

[[redirects]]
  from = "/stories"
  to = "/stories.html"
  status = 200

[[redirects]]
  from = "/lets-talk"
  to = "/lets-talk.html"
  status = 200

[[redirects]]
  from = "/talk"
  to = "/lets-talk.html"
  status = 301

[[redirects]]
  from = "/discovery-call"
  to = "/lets-talk.html"
  status = 301

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/events"
  to = "/events.html"
  status = 200

[[redirects]]
  from = "/access"
  to = "/access.html"
  status = 200

# Catch-all 404 — must be the LAST redirect rule
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
